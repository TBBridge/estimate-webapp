<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #ffffff; font-family: Arial, sans-serif;
  display: flex; padding: 24pt;
}

.right { width: 200pt; flex-shrink: 0; display: flex; align-items: center; }

h2 { color: #2d3748; font-size: 24pt; margin: 0 0 16pt 0; border-bottom: 3pt solid #3182ce; padding-bottom: 8pt; }
p { color: #4a5568; font-size: 12pt; line-height: 1.5; margin: 0 0 8pt 0; }

<body>
<div class="left">
<h2>システム全体像（アーキテクチャ）</h2>
<ul>
<li><b>インフラ</b>：Vercel（サーバーレス）</li>
<li><b>フロント／バック</b>：Next.js 15 / React 19 / TypeScript</li>
<li><b>データベース</b>：Neon Postgres</li>
<li><b>ファイル</b>：Vercel Blob（テンプレート・生成Excel/PDF）</li>
