<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
html { background: #f7fafc; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #f7fafc; font-family: Arial, sans-serif;
  display: flex; padding: 24pt;
}
.left { flex: 1; }
.right { width: 200pt; flex-shrink: 0; display: flex; align-items: center; }
.right img { max-width: 100%; height: auto; }
h2 { color: #2d3748; font-size: 24pt; margin: 0 0 16pt 0; border-bottom: 3pt solid #3182ce; padding-bottom: 8pt; }
p { color: #4a5568; font-size: 12pt; line-height: 1.5; margin: 0 0 8pt 0; }
ul { margin: 0; padding-left: 20pt; color: #4a5568; font-size: 12pt; }
</style>
</head>
<body>
<div class="left">
<h2>コア機能② Excel自動入力とPDF生成</h2>
<p><b>Excel自動入力 (ExcelJS)</b></p>
<ul>
<li>「設定情報」シートに顧客名・ライセンス数・代理店種別を書き込み</li>
<li>Excel側のVLOOKUP・計算式をそのまま活用</li>
</ul>
<p><b>高精度PDF変換 (CloudConvert)</b></p>
<ul>
<li>「表紙」「ライセンス」「保守料」の3シートのみPDF化</li>
<li>設定情報シートは veryHidden にし、数式参照を維持したまま変換対象から除外</li>
</ul>
</div>
<div class="right"><img src="../images/slide08-excel-pdf.png" alt=""></div>
</body>
</html>
