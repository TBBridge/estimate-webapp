<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
html { background: #f7fafc; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #f7fafc; font-family: Arial, sans-serif;
  display: flex; padding: 24pt;
}
.left { flex: 1; }
.right { width: 220pt; flex-shrink: 0; display: flex; align-items: center; }
.right img { max-width: 100%; height: auto; }
h2 { color: #2d3748; font-size: 24pt; margin: 0 0 16pt 0; border-bottom: 3pt solid #3182ce; padding-bottom: 8pt; }
ul { margin: 0; padding-left: 20pt; color: #4a5568; font-size: 12pt; line-height: 1.7; }
</style>
</head>
<body>
<div class="left">
<h2>UI / UX のこだわり</h2>
<ul>
<li><b>モダンなデザイン</b>：Tailwind CSS による統一されたインターフェース</li>
<li><b>レスポンシブ＆ダークモード</b>：端末に合わせた表示とテーマ切り替え</li>
<li><b>多言語対応 (i18n)</b>：日本語・英語の切り替え</li>
<li><b>動的フォーム</b>：提供形態・契約形態に応じて入力項目がリアルタイムに切り替わる直感的なフォーム</li>
</ul>
</div>
<div class="right"><img src="../images/slide06-ui.png" alt=""></div>
</body>
</html>
